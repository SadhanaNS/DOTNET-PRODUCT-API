# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- dev

pool:
  vmImage: ubuntu-latest

variables:
 buildConfiguration: 'Release'
 dotnetVersion: '8.0.x'
 projectPath: '**/*.csproj'

stages: 
 - stage: Build
   jobs:
     - job: build
       steps:
          - task: DotNetCoreCLI@2
            displayName: 'intalling dependencies'
            inputs:
              azureSubscription: 'Azure subscription 1(d7b7b790-dad8-4cbb-bc81-f19c99e4569a)'
              command: 'restore'
              projects: '$(projectPath)'
              feedsToUse: 'select'

 - stage: sonartest
   displayName: 'Sonarqube scan'
   jobs:
     - job: sonartest
       steps:

        - task: SonarQubePrepare@8
          inputs:
            SonarQube: 'sonarsvc'
            scannerMode: 'dotnet'
            projectKey: 'sadhanavs2025_Product-api-app-dotnet'
            projectName: 'Product-api-app-dotnet'
          
        - task: DotNetCoreCLI@2
          displayName: 'build web app'
          inputs:
                azureSubscription: 'Azure subscription 1(d7b7b790-dad8-4cbb-bc81-f19c99e4569a)'
                command: 'build'
                projects: '$(projectPath)'

        - task: SonarQubeAnalyze@8
          inputs:
            jdkversion: 'JAVA_HOME_17_X64'

        - task: SonarQubePublish@8
          inputs:
            pollingTimeoutSec: '300'
            
        - task: DotNetCoreCLI@2
          displayName: 'publish web app'
          inputs:
              azureSubscription: 'Azure subscription 1(d7b7b790-dad8-4cbb-bc81-f19c99e4569a)'
              command: 'publish'
              publishWebProjects: true
              arguments: >
               --configuration $(buildConfiguration)                                
               --output $(Build.ArtifactStagingDirectory)/app              
              zipAfterPublish: true

        - task: PublishBuildArtifacts@1
          displayName: 'upload build artifact'
          inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/app'
              ArtifactName: 'drop'
              publishLocation: 'Container'

 - stage: Deploy
   displayName: 'Disploy to web app'
   dependsOn: Build
   condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/dev'))
   jobs:
     - deployment: Deploywebapp
       displayName: 'Deploy productcataloge'
       environment: dev
       strategy:
        runOnce:
          deploy:
            steps:
              
            - task: DownloadBuildArtifacts@1
              inputs:
               buildType: 'current'
               downloadType: 'single'
               artifactName: 'drop'
               downloadPath: '$(System.ArtifactsDirectory)'
            
            - task: AzureWebApp@1
              inputs:
                azureSubscription: 'Azure subscription 1(d7b7b790-dad8-4cbb-bc81-f19c99e4569a)'
                appType: 'webApp'
                appName: 'product-api-app'
                package: '$(System.ArtifactsDirectory)/**/*.zip'
                deploymentMethod: 'auto'