trigger:
  - dev
  - main

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '8.0.x'
  projectPath: '**/*.csproj'

stages:
  - stage: BuildandSAST
    displayName: 'Build and SAST Scan'
    jobs:
      - job: build
        steps:
          - checkout: self
            fetchDepth: 0
            fetchTags: true

          - task: DotNetCoreCLI@2
            displayName: 'Installing dependencies'
            inputs:
              command: 'restore'
              projects: '$(projectPath)'
              feedsToUse: 'select'

          - task: SonarCloudPrepare@4
            inputs:
              SonarCloud: 'sonarsvc'
              organization: 'sadhanavs2025'
              scannerMode: 'dotnet'
              projectKey: 'sadhanavs2025_Product-api-app-dotnet'
              projectName: 'Product-api-app-dotnet'

          - task: DotNetCoreCLI@2
            displayName: 'Build web app'
            inputs:
              command: 'build'
              projects: '$(projectPath)'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: SonarCloudAnalyze@4
            displayName: 'SonarCloud - Analyze'

          - task: SonarCloudPublish@4
            displayName: 'SonarCloud - Quality Gate'
            inputs:
              pollingTimeoutSec: '300'

          - task: DotNetCoreCLI@2
            displayName: 'Publish web app'
            inputs:
              command: 'publish'
              publishWebProjects: true
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/app --no-build'
              zipAfterPublish: true

          - task: PublishBuildArtifacts@1
            displayName: 'Upload build artifact'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/app'
              ArtifactName: 'drop'
              publishLocation: 'Container'

  - stage: Deploy
    displayName: 'Deploy to web app'
    dependsOn: BuildandSAST
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/dev'))
    jobs:
      - deployment: Deploywebapp
        displayName: 'Deploy productcataloge'
        environment: dev
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@1
                  inputs:
                    buildType: 'current'
                    downloadType: 'single'
                    artifactName: 'drop'
                    downloadPath: '$(System.ArtifactsDirectory)'

                - task: AzureWebApp@1
                  inputs:
                    azureSubscription: 'Azure subscription 1(d7b7b790-dad8-4cbb-bc81-f19c99e4569a)'
                    appType: 'webApp'
                    appName: 'product-api-app'
                    package: '$(System.ArtifactsDirectory)/**/*.zip'
                    deploymentMethod: 'auto'